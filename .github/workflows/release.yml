name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MSYS2 toolchain
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain

      - name: Add Windows GNU target
        if: runner.os == 'Windows'
        shell: pwsh
        run: rustup target add x86_64-pc-windows-gnu

      - name: Rust format check
        run: cargo fmt --all --check

      - name: Rust lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test

      - name: Build release library
        if: runner.os != 'Windows'
        run: cargo build --release

      - name: Build Windows GNU release library
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: gcc
          CC_x86_64_pc_windows_gnu: gcc
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Verify Linux/macOS release library exists
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            test -f target/release/libv_kernelx.so
          else
            test -f target/release/libv_kernelx.dylib
          fi

      - name: Verify Windows GNU release library exists
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dll = "target\x86_64-pc-windows-gnu\release\v_kernelx.dll"
          $imp = "target\x86_64-pc-windows-gnu\release\libv_kernelx.dll.a"

          if (!(Test-Path $dll)) {
            Write-Error "$dll not found"
            exit 1
          }

          if (!(Test-Path $imp)) {
            Write-Error "$imp not found"
            exit 1
          }

          Write-Host "Windows GNU build verified"

      - name: Build Python wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist

      #
      # ----------------------------
      # PACKAGE NATIVE FFI ARTIFACTS
      # ----------------------------
      #

      - name: Package Windows native bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path native\include | Out-Null

          Copy-Item target\x86_64-pc-windows-gnu\release\v_kernelx.dll native\
          Copy-Item target\x86_64-pc-windows-gnu\release\libv_kernelx.dll.a native\
          Copy-Item include\v_kernelx.h native\include\

          Set-Content -Path native\ABI_VERSION -Value "1"

          Compress-Archive `
            -Path native\* `
            -DestinationPath v-kernelx-windows-x86_64.zip

      - name: Package Linux native bundle
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p native/include

          cp target/release/libv_kernelx.so native/
          cp include/v_kernelx.h native/include/
          echo "1" > native/ABI_VERSION

          tar -czf v-kernelx-linux-x86_64.tar.gz -C native .

      - name: Package macOS native bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p native/include

          cp target/release/libv_kernelx.dylib native/
          cp include/v_kernelx.h native/include/
          echo "1" > native/ABI_VERSION

          tar -czf v-kernelx-macos-x86_64.tar.gz -C native .

      #
      # ----------------------------
      # UPLOAD WORKFLOW ARTIFACTS
      # ----------------------------
      #

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

      - name: Upload Windows native artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: v-kernelx-windows-x86_64
          path: v-kernelx-windows-x86_64.zip

      - name: Upload Linux native artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: v-kernelx-linux-x86_64
          path: v-kernelx-linux-x86_64.tar.gz

      - name: Upload macOS native artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: v-kernelx-macos-x86_64
          path: v-kernelx-macos-x86_64.tar.gz